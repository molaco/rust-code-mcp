ra_ap_ide_db = { workspace = true }
"ra_ap_load-cargo" = { workspace = true }
ra_ap_project_model = { workspace = true }
ra_ap_vfs = { workspace = true }
ra_ap_paths = { workspace = true }
ra_ap_hir = { workspace = true }
ra_ap_hir_def = { workspace = true }
ra_ap_base_db = { workspace = true }

# Persisted hypergraph store
heed = { workspace = true }

# Phase 3: Semantic Code Chunking
text-splitter = { workspace = true }

# Phase 4: Embedding Generation
fastembed = { workspace = true }
candle-core = { workspace = true }
hf-hub = { workspace = true }

# Phase 5: Vector Database
async-trait = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

# Vector database - embedded (default)
lancedb = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }

# Additional dependencies for Phase 1
walkdir = { workspace = true }
anyhow = { workspace = true }
regex = { workspace = true }
glob = { workspace = true }
cargo_metadata = { workspace = true }

# Merkle tree for 100x faster change detection (Week 2)
rs_merkle = { workspace = true }

# Performance monitoring
sysinfo = { workspace = true }

# Tokenizer (used directly by examples; transitively in fastembed)
tokenizers = { workspace = true }

# Parallel processing
rayon = { workspace = true }
