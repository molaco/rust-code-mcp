# Workspace member path deps (populated as Phase 7 B.1+ lifts modules)
rmc-engine = { path = "crates/rmc-engine" }
rmc-graph = { path = "crates/rmc-graph" }

[features]
default = ["embedded"]  # LanceDB embedded backend (zero-config)
embedded = []  # LanceDB is always included, this is just a marker

[patch.crates-io]
fastembed = { path = "vendor/fastembed" }

